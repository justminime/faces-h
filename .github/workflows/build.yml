name: Build (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sidecar/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Python dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        run: pyinstaller faces-sidecar.spec

      - name: Rename sidecar binary for Tauri externalBin
        run: Copy-Item sidecar\dist\faces-sidecar.exe "sidecar\dist\faces-sidecar-x86_64-pc-windows-msvc.exe"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: faces-h-windows-installer-${{ github.sha }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
