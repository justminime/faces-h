name: Build (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sidecar/requirements.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install Python dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        run: pyinstaller faces-sidecar.spec

      - name: Rename sidecar binary for Tauri externalBin
        run: Copy-Item sidecar\dist\faces-sidecar.exe "sidecar\dist\faces-sidecar-x86_64-pc-windows-msvc.exe"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: faces-h-windows-installer-${{ github.sha }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
