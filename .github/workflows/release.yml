name: Release

# Two ways to trigger a release build:
#
# 1. GitHub Releases UI  — go to Releases → "Create a new release",
#    choose / create tag v0.1.0, fill in notes, click "Publish release".
#    GitHub creates the tag, the release, and this workflow fires automatically.
#
# 2. Actions tab  — go to Actions → Release → "Run workflow",
#    enter the version (e.g. v0.1.0), click Run.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and release Windows installer
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Inject version from release tag
        shell: pwsh
        run: |
          $version = "$env:RELEASE_TAG" -replace '^v', ''
          $conf = Get-Content src-tauri/tauri.conf.json -Raw
          $conf = $conf -replace '"version":\s*"[^"]*"', ('"version": "' + $version + '"')
          Set-Content src-tauri/tauri.conf.json $conf
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '(?m)^version\s*=\s*"[^"]*"', ('version = "' + $version + '"')
          Set-Content src-tauri/Cargo.toml $cargo
          Write-Host "Patched to $version"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sidecar/requirements.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install Python dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        run: pyinstaller faces-sidecar.spec

      - name: Rename sidecar binary for Tauri externalBin
        run: Copy-Item sidecar\dist\faces-sidecar.exe "sidecar\dist\faces-sidecar-x86_64-pc-windows-msvc.exe"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the installer and produces the .sig + updater .zip that
          # bundle.createUpdaterArtifacts (tauri.conf.json) asks for (#180).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run tauri

      # ── TODO: Code signing (SignPath Foundation) ──────────────────────────
      # Re-add signing steps here once SignPath Foundation approves the OSS
      # application. Steps needed:
      #   1. Add permissions: id-token: write / actions: read
      #   2. Upload unsigned installer as artifact (upload-artifact@v4)
      #   3. signpath/github-action-submit-signing-request (pinned SHA)
      #   4. Publish signed/*.exe instead of nsis/*.exe
      # Secrets required: SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID

      - name: Generate updater manifest (latest.json)
        shell: pwsh
        run: |
          $version = "$env:RELEASE_TAG" -replace '^v', ''
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $sigFile = Get-ChildItem -Path $bundleDir -Filter "*.sig" | Select-Object -First 1
          if (-not $sigFile) {
            Write-Error "No .sig file in $bundleDir — updater artifacts were not generated. Check TAURI_SIGNING_PRIVATE_KEY is set and bundle.createUpdaterArtifacts is true."
            exit 1
          }
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          $zipName = $sigFile.Name -replace '\.sig$', ''
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $manifest = [ordered]@{
            version   = $version
            notes     = "See https://github.com/justminime/faces-h/releases/tag/$env:RELEASE_TAG for release notes."
            pub_date  = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = "https://github.com/justminime/faces-h/releases/download/$env:RELEASE_TAG/$zipName"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path "latest.json" -Encoding utf8
          Write-Host "Generated latest.json for $zipName"

      - name: Publish installer to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "faces-h ${{ env.RELEASE_TAG }}"
          body: |
            ## Installation

            Download `faces-h-setup-*.exe` and run it. No additional software required.

            The app will download the face recognition model (~300 MB) on first launch.

            > **Note:** This release is not yet code-signed. Windows SmartScreen may warn on first run — click "More info → Run anyway".

            ## Post-install verification

            Run the bundled smoke test against the running sidecar:
            ```
            python scripts/smoke_test.py
            ```

            ## Updating
            Existing installs get an in-app update notification (Help > Check for Updates…) — no need to manually download and run a new installer.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.zip
            src-tauri/target/release/bundle/nsis/*.sig
            latest.json
          generate_release_notes: true
