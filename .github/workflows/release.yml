name: Release

# Two ways to trigger a release build:
#
# 1. GitHub Releases UI  — go to Releases → "Create a new release",
#    choose / create tag v0.1.0, fill in notes, click "Publish release".
#    GitHub creates the tag, the release, and this workflow fires automatically.
#
# 2. Actions tab  — go to Actions → Release → "Run workflow",
#    enter the version (e.g. v0.1.0), click Run.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write  # SignPath OIDC verification
  actions: read    # SignPath artifact download

jobs:
  release-windows:
    name: Build and release Windows installer
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Inject version from release tag
        shell: pwsh
        run: |
          $version = "$env:RELEASE_TAG" -replace '^v', ''
          $conf = Get-Content src-tauri/tauri.conf.json -Raw
          $conf = $conf -replace '"version":\s*"[^"]*"', ('"version": "' + $version + '"')
          Set-Content src-tauri/tauri.conf.json $conf
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '(?m)^version\s*=\s*"[^"]*"', ('version = "' + $version + '"')
          Set-Content src-tauri/Cargo.toml $cargo
          Write-Host "Patched to $version"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sidecar/requirements.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install Python dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        run: pyinstaller faces-sidecar.spec

      - name: Rename sidecar binary for Tauri externalBin
        run: Copy-Item sidecar\dist\faces-sidecar.exe "sidecar\dist\faces-sidecar-x86_64-pc-windows-msvc.exe"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app (unsigned)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri

      # ── Code signing (SignPath Foundation — free for OSS) ─────────────────
      #
      # Prerequisite: apply at https://signpath.io/free-certificates-for-open-source-software/
      # Once approved, add these two secrets in Settings → Secrets → Actions:
      #   SIGNPATH_ORGANIZATION_ID  — shown in SignPath web UI under Settings
      #   SIGNPATH_API_TOKEN        — create in SignPath under Settings → API tokens
      #
      # SignPath project setup (in their web UI):
      #   Project slug:             faces-h
      #   Artifact configuration:   initial  (sign *.exe at the root of the ZIP)
      #   Signing policy:           release-signing
      #
      # When the secrets are not set (before approval) the two signing steps
      # are skipped and the unsigned installer is published instead.

      - name: Upload unsigned installer for SignPath
        id: upload-unsigned
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unsigned-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign installer via SignPath Foundation
        id: sign
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@ced31329c0317e779dad2eec2a7c3bb46ea1343e # v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: faces-h
          artifact-configuration-slug: initial
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed/

      # ── Publish to GitHub Release ─────────────────────────────────────────

      - name: Publish signed installer to GitHub Release
        if: steps.sign.outcome == 'success'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "faces-h ${{ env.RELEASE_TAG }}"
          body: |
            ## Installation

            Download `faces-h-setup-*.exe` and run it. No additional software required.

            The app will download the face recognition model (~300 MB) on first launch.

            ## Post-install verification

            Run the bundled smoke test against the running sidecar:
            ```
            python scripts/smoke_test.py
            ```
          draft: false
          prerelease: false
          files: signed/*.exe
          generate_release_notes: true

      - name: Publish unsigned installer to GitHub Release (no signing cert yet)
        if: steps.sign.outcome != 'success'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "faces-h ${{ env.RELEASE_TAG }}"
          body: |
            ## Installation

            Download `faces-h-setup-*.exe` and run it. No additional software required.

            The app will download the face recognition model (~300 MB) on first launch.

            > **Note:** This release is not yet code-signed. Windows SmartScreen may warn on first run — click "More info → Run anyway".

            ## Post-install verification

            Run the bundled smoke test against the running sidecar:
            ```
            python scripts/smoke_test.py
            ```
          draft: false
          prerelease: false
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
